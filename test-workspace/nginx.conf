# Yozakura - NGINX example
# These files are all gibberish, do not attempt to run them

#  Main Context 
user  nginx;
worker_processes  auto;
worker_rlimit_nofile  65535;
pid   /var/run/nginx.pid;
error_log  /var/log/nginx/error.log  warn;

#  Events Block 
events {
    worker_connections  4096;
    multi_accept        on;
    use                 epoll;
}

#  HTTP Block 
http {
    # MIME types
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging format
    log_format  main  '$remote_addr - $remote_user [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent" '
                      '$request_time $upstream_response_time';

    log_format  json  escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes":$body_bytes_sent,'
            '"duration":$request_time,'
            '"upstream":"$upstream_addr"'
        '}';

    access_log  /var/log/nginx/access.log  json;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout       65;
    keepalive_requests      1000;
    reset_timedout_connection on;
    client_body_timeout     10;
    send_timeout            10;

    # Buffer sizes
    client_max_body_size        16m;
    client_body_buffer_size     128k;
    client_header_buffer_size   4k;
    large_client_header_buffers 4 32k;

    # Compression
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # Security headers (applied via map/add_header)
    add_header  X-Frame-Options         DENY          always;
    add_header  X-Content-Type-Options  nosniff       always;
    add_header  X-XSS-Protection        "1; mode=block" always;
    add_header  Referrer-Policy         "strict-origin-when-cross-origin" always;

    # SSL settings (shared)
    ssl_protocols              TLSv1.2 TLSv1.3;
    ssl_ciphers                ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers  off;
    ssl_session_cache          shared:SSL:10m;
    ssl_session_timeout        1d;
    ssl_session_tickets        off;
    ssl_stapling               on;
    ssl_stapling_verify        on;

    #  Maps 
    map $request_method $cors_methods {
        default "GET, POST, PUT, DELETE, PATCH, OPTIONS";
    }

    map $http_origin $cors_origin {
        default            "";
        "~^https://(www\.)?example\.com$"  $http_origin;
        "~^http://localhost:(3000|5173)$"   $http_origin;
    }

    map $uri $cache_control {
        default                    "no-cache, no-store";
        "~*\.(css|js)$"           "public, max-age=31536000, immutable";
        "~*\.(png|jpg|webp|avif)$" "public, max-age=2592000";
        "~*\.(woff2?)$"           "public, max-age=31536000, immutable";
        "~*/api/"                 "no-store";
    }

    map $status $loggable {
        ~^[23]  0;
        default 1;
    }

    # Geo-based blocking
    geo $blocked_ip {
        default         0;
        10.0.0.0/8      0;   # internal - allow
        192.168.0.0/16  0;   # LAN - allow
        # 1.2.3.4/32    1;   # example block
    }

    # Rate limiting zones
    limit_req_zone  $binary_remote_addr  zone=api:10m      rate=30r/m;
    limit_req_zone  $binary_remote_addr  zone=login:10m    rate=5r/m;
    limit_req_zone  $binary_remote_addr  zone=global:10m   rate=100r/s;
    limit_conn_zone $binary_remote_addr  zone=conn_limit:10m;

    #  Upstreams 
    upstream app_backend {
        least_conn;
        server  127.0.0.1:3000  weight=5  max_fails=3  fail_timeout=30s;
        server  127.0.0.1:3001  weight=3  max_fails=3  fail_timeout=30s;
        server  127.0.0.1:3002  backup;
        keepalive 32;
    }

    upstream api_backend {
        ip_hash;
        server  127.0.0.1:4000;
        server  127.0.0.1:4001;
        keepalive 16;
    }

    #  Redirect HTTP → HTTPS 
    server {
        listen       80;
        listen       [::]:80;
        server_name  example.com www.example.com;

        # ACME challenge (Let's Encrypt)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    #  Main HTTPS Server 
    server {
        listen       443 ssl http2;
        listen       [::]:443 ssl http2;
        server_name  example.com;

        root   /var/www/html;
        index  index.html;

        # SSL certificate
        ssl_certificate      /etc/letsencrypt/live/example.com/fullchain.pem;
        ssl_certificate_key  /etc/letsencrypt/live/example.com/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/example.com/chain.pem;

        # HSTS
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # CSP
        add_header Content-Security-Policy
            "default-src 'self'; "
            "script-src 'self' 'nonce-$request_id'; "
            "style-src 'self' 'unsafe-inline'; "
            "img-src 'self' data: https:; "
            "font-src 'self'; "
            "connect-src 'self' https://api.example.com; "
            "frame-ancestors 'none';"
            always;

        # Cache-Control header from map
        add_header Cache-Control $cache_control always;

        # Block bad IPs
        if ($blocked_ip) {
            return 403;
        }

        # Global rate limiting
        limit_req   zone=global  burst=200  nodelay;
        limit_conn  conn_limit   100;

        #  Locations 

        # Exact match
        location = /favicon.ico {
            log_not_found off;
            access_log    off;
            expires       1y;
        }

        location = /robots.txt {
            allow all;
            log_not_found off;
        }

        # Prefix match - static assets
        location /assets/ {
            alias /var/www/html/assets/;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;

            # CORS for fonts
            if ($cors_origin) {
                add_header Access-Control-Allow-Origin $cors_origin;
            }
        }

        # Regex match - API proxy
        location ~ ^/api/v[0-9]+/ {
            # Rate limiting
            limit_req  zone=api  burst=60  nodelay;

            # CORS preflight
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin      $cors_origin;
                add_header Access-Control-Allow-Methods     $cors_methods;
                add_header Access-Control-Allow-Headers     "Content-Type, Authorization, X-Request-ID";
                add_header Access-Control-Max-Age           86400;
                add_header Content-Length                   0;
                return 204;
            }

            add_header Access-Control-Allow-Origin $cors_origin always;

            # Proxy settings
            proxy_pass              http://api_backend;
            proxy_http_version      1.1;
            proxy_set_header        Host              $host;
            proxy_set_header        X-Real-IP         $remote_addr;
            proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header        X-Forwarded-Proto $scheme;
            proxy_set_header        Connection        "";
            proxy_set_header        X-Request-ID      $request_id;
            proxy_read_timeout      60s;
            proxy_connect_timeout   5s;
            proxy_send_timeout      30s;
            proxy_buffer_size       16k;
            proxy_buffers           4  64k;
            proxy_busy_buffers_size 128k;

            # Hide upstream headers
            proxy_hide_header X-Powered-By;
            proxy_hide_header Server;
        }

        # Login - stricter rate limit
        location = /api/auth/login {
            limit_req zone=login  burst=10  nodelay;
            proxy_pass http://api_backend;
        }

        # WebSocket
        location /ws {
            proxy_pass          http://app_backend;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade    $http_upgrade;
            proxy_set_header    Connection "upgrade";
            proxy_set_header    Host       $host;
            proxy_read_timeout  3600s;
        }

        # SPA fallback - serve index.html for client-side routing
        location / {
            try_files $uri $uri/ /index.html;

            # Security: no sniffing on HTML
            add_header X-Content-Type-Options nosniff always;
        }

        # Error pages
        error_page  404              /404.html;
        error_page  500 502 503 504  /50x.html;

        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }

    #  www redirect 
    server {
        listen       443 ssl http2;
        server_name  www.example.com;
        ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
        return 301 https://example.com$request_uri;
    }

    #  Status endpoint (internal only) 
    server {
        listen  127.0.0.1:8090;
        server_name  _;

        location = /nginx_status {
            stub_status;
            allow 127.0.0.1;
            deny  all;
        }

        location = /health {
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }

    #  Include other configs 
    include /etc/nginx/conf.d/*.conf;
}
