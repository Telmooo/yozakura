<!-- Yozakura - HTML example -->
<!-- These files are all gibberish, do not attempt to run them -->
<!doctype html>
<html lang="en" data-theme="dark" data-version="1.0.0">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Yozakura theme test page" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta property="og:title" content="Yozakura" />
    <meta property="og:image" content="/assets/preview.png" />

    <title>Yozakura &mdash; Theme Test</title>

    <link rel="stylesheet" href="example.css" />
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
      crossorigin="anonymous"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Inline styles for theme tokens -->
    <style>
      :root {
        --color-bg: #160f1e;
        --color-fg: #e0d4e8;
        --color-accent: #fdb8ff;
        --font-mono: "Fira Code", "Cascadia Code", monospace;
      }

      body {
        background: var(--color-bg);
        color: var(--color-fg);
        font-family: var(--font-mono);
        margin: 0;
      }
    </style>
  </head>

  <body>
    <!--  Main Content  -->
    <main id="main-content" role="main">
      <article class="post" itemscope itemtype="https://schema.org/Article">
        <header class="post__header">
          <h1 class="post__title" itemprop="headline">
            Yozakura &mdash; A Dark Theme
          </h1>
          <p class="post__meta">
            <time datetime="2026-03-28" itemprop="datePublished"
              >March 28, 2026</time
            >
          </p>
        </header>

        <section class="post__content" itemprop="articleBody">
          <p>
            This is a <strong>bold</strong> statement, and
            <em>this is italic</em>. Here is some <code>inline code</code> and a
            <a
              href="https://example.com"
              target="_blank"
              rel="noopener noreferrer"
            >
              external link </a
            >.
          </p>

          <blockquote cite="https://example.com">
            <p>The beauty of late cherry blossoms</p>
            <footer>&mdash; <cite>Someone</cite></footer>
          </blockquote>
        </section>
      </article>

      <!--  SVG  -->
      <figure>
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="200"
          height="200"
          viewBox="0 0 200 200"
          aria-label="Cherry blossom illustration"
          role="img"
        >
          <defs>
            <radialGradient id="petalGrad" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#fdb8ff" stop-opacity="1" />
              <stop offset="100%" stop-color="#c792ea" stop-opacity="0.5" />
            </radialGradient>
          </defs>
          <circle cx="100" cy="100" r="80" fill="url(#petalGrad)" />
          <circle cx="100" cy="100" r="20" fill="#fdb8ff" />
          <text
            x="100"
            y="180"
            text-anchor="middle"
            fill="#e0d4e8"
            font-family="monospace"
            font-size="14"
          >
            夜桜
          </text>
        </svg>
        <figcaption>Yozakura (夜桜)</figcaption>
      </figure>
    </main>

    <!--  Footer  -->
    <footer class="site-footer" role="contentinfo">
      <address>
        Contact information
      </address>
    </footer>

    <!--  Scripts  -->
    <script type="module">
      // ES module inline script
      import { createApp } from "/js/app.js";

      const form = document.getElementById("contact-form");
      const app = createApp({
        el: "#app",
        data: {
          theme: document.documentElement.dataset.theme ?? "dark",
          count: 0,
        },
      });

      form?.addEventListener("submit", async (event) => {
        event.preventDefault();
        const data = new FormData(event.target);
        const payload = Object.fromEntries(data.entries());

        try {
          const response = await fetch("/api/contact", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          console.log("Submitted:", await response.json());
        } catch (err) {
          console.error("Submission failed:", err);
        }
      });

      document
        .querySelector('[data-action="toggle-theme"]')
        ?.addEventListener("click", () => {
          const html = document.documentElement;
          html.dataset.theme = html.dataset.theme === "dark" ? "light" : "dark";
        });
    </script>

    <script>
      // Legacy inline script
      (function () {
        "use strict";
        var VERSION = "1.0.0";
        console.log("App version:", VERSION);
      })();
    </script>
    
    <style>
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 16rem;
      }
    </style>
  </body>
</html>
